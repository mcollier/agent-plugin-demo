# Configuration file for MegaLinter
#
# See all available variables at https://megalinter.io/latest/config-file/ and in
# linters documentation
---
# all, none, or list of linter keys
APPLY_FIXES: none

# If you use ENABLE variable, all other languages/formats/tooling-formats will
# be disabled by default
# ENABLE:

# If you use ENABLE_LINTERS variable, all other linters will be disabled by
# default
# https://megalinter.io/latest/descriptors/action_actionlint/ - static checker for GitHub Actions workflow files
# https://megalinter.io/latest/descriptors/markdown_markdownlint/ - Node.js static analysis tool and linter for Markdown files
# https://megalinter.io/latest/descriptors/markdown_markdown_table_formatter/ - specialized formatting tool that detects and automatically corrects improperly formatted Markdown tables
# https://megalinter.io/latest/descriptors/spell_cspell/ - comprehensive spell checker for code
# https://megalinter.io/latest/descriptors/yaml_prettier/ - opinionated code formatter that brings consistency to YAML files
# https://megalinter.io/latest/descriptors/yaml_yamllint/ - linter for YAML files that checks for syntax validity, key repetition, lines length, trailing spaces, indentation, and other common YAML issues
# https://megalinter.io/latest/descriptors/spell_lychee/ - fast, async, stream-based link checker written in Rust that finds broken hyperlinks and mail addresses
ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - MARKDOWN_MARKDOWNLINT
  - MARKDOWN_MARKDOWN_TABLE_FORMATTER
  - SPELL_CSPELL
  - YAML_PRETTIER
  - YAML_YAMLLINT
  - SPELL_LYCHEE
  - REPOSITORY_SECRETLINT

DISABLE:
  - COPYPASTE # Comment to enable checks of excessive copy-pastes
  # - SPELL # Uncomment to disable checks of spelling mistakes

SHOW_ELAPSED_TIME: true
SPELL_CSPELL_DISABLE_ERRORS: true
FILEIO_REPORTER: false
PARALLEL: true
GITHUB_STATUS_REPORTER: true
LOG_LEVEL: WARNING
MARKDOWN_MARKDOWN_TABLE_FORMATTER_ARGUMENTS: "-c"

# Uncomment if you want MegaLinter to detect errors but not block CI to pass
# DISABLE_ERRORS: true
